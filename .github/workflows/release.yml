name: Auto Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install crx tool
        run: npm install -g crx

      - name: Create secret key
        run: echo "${{ secrets.EXTENSION_PEM }}" > key.pem

      - name: Package into CRX file
        # Package the current directory as kanon.crx
        run: crx pack . -o kanon.crx -p key.pem

      - name: Get current time
        id: vars
        run: echo "TAG_NAME=auto-$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create release and upload file
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.TAG_NAME }}
          name: Release ${{ steps.vars.outputs.TAG_NAME }}
          files: kanon.crx
          prerelease: true  # ★Add this here! This is the identity of the beta badge
          body: "Auto-generated beta version CRX release."

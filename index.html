<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanon New Tab</title>
  <link rel="stylesheet" href="output.css">
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #f8fafc; overflow: hidden; }
    #main-content { padding: 2rem; max-width: 1200px; margin: 0 auto; }
    #icon-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 1rem; }
    
    /* ドロワー＆iframeレイアウト */
    #settings-drawer-overlay {
      position: fixed; top: 0; right: -100%; width: 360px; height: 100%;
      background: white; box-shadow: -4px 0 15px rgba(0,0,0,0.1);
      transition: right 0.3s ease; z-index: 50;
    }
    body.drawer-open #settings-drawer-overlay { right: 0; }
    #settings-iframe { width: 100%; height: 100%; border: none; }
    #drawer-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.3); opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease; z-index: 40;
    }
    body.drawer-open #drawer-backdrop { opacity: 1; pointer-events: auto; }
    .open-btn {
      position: fixed; top: 1rem; right: 1rem; padding: 0.6rem 1rem;
      background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 500;
    }
  </style>
</head>
<body>
  <div id="main-content">
    <h1 style="text-align:center; margin-bottom: 2rem; color: #334155;">✨ Kanon New Tab</h1>
    <p style="text-align:center; color: #64748b; margin-bottom: 2rem;">お気に入りのサイトをすばやく整理・アクセス</p>
    <div id="icon-container"></div>
  </div>

  <button id="open-drawer-btn" class="open-btn">設定・管理</button>
  <div id="drawer-backdrop"></div>
  <div id="settings-drawer-overlay">
    <iframe id="settings-iframe" src="settings.html"></iframe>
  </div>

  <script src="script.js"></script>
</body>
</html>

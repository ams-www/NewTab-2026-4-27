<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZY New Tab</title>
  <link rel="stylesheet" href="output.css">
  <script src="theme.js"></script>
</head>

<body class="m-0 font-sans bg-slate-50 dark:bg-slate-900 overflow-hidden">
  <!-- 壁紙レイヤー -->
  <div id="wallpaper-layer"
    class="fixed inset-0 z-0 pointer-events-none transition-opacity duration-500"
    style="opacity: 0;">
  </div>
  <!-- 壁紙オーバーレイレイヤー -->
  <div id="wallpaper-overlay"
    class="fixed inset-0 z-0 pointer-events-none hidden">
  </div>

  <div id="main-content" class="p-8 max-w-7xl mx-auto h-screen overflow-y-auto relative z-10">
    <h1 class="text-center mb-8 text-slate-700 dark:text-slate-200 text-3xl">✨ ZY New Tab</h1>
    <p class="text-center text-slate-600 dark:text-slate-400 mb-8">お気に入りのサイトをすばやく整理・アクセス</p>
    <div id="icon-container" class="grid grid-cols-[repeat(auto-fill,minmax(120px,1fr))] gap-4"></div>
  </div>

  <!-- hover:-translate-y-0.5 を削除して持ち上がる動きを除去 -->
  <button id="open-edit-btn"
    class="fixed top-4 left-4 z-30 px-4 py-2.5 bg-slate-500 hover:bg-slate-600 dark:bg-slate-700 dark:hover:bg-slate-600 text-white border-none rounded-lg cursor-pointer font-medium shadow-md transition-all">✏️
    編集モード</button>
  <button id="open-settings-btn"
    class="fixed top-4 right-4 z-30 px-4 py-2.5 bg-blue-500 hover:bg-blue-600 dark:bg-blue-600 dark:hover:bg-blue-500 text-white border-none rounded-lg cursor-pointer font-medium shadow-lg transition-all">設定・管理</button>

  <div id="drawer-backdrop"
    class="fixed inset-0 bg-black/30 dark:bg-black/50 opacity-0 pointer-events-none transition-opacity duration-300 z-40">
  </div>
  <div id="settings-drawer-overlay"
    class="fixed top-0 -right-full w-[360px] h-full bg-white dark:bg-slate-800 shadow-[-4px_0_15px_rgba(0,0,0,0.1)] transition-[right] duration-300 z-50">
    <iframe id="settings-iframe" class="w-full h-full border-none" src="about:blank"></iframe>
  </div>

  <div id="edit-overlay" class="fixed inset-0 bg-slate-200 dark:bg-slate-900 z-60 hidden flex-col">
    <iframe id="edit-iframe" class="w-full h-full border-none" src="about:blank"></iframe>
  </div>

  <script src="script.js"></script>
</body>

</html>

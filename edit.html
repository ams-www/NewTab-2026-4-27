<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>編集モード</title>
  <link rel="stylesheet" href="output.css">
  <script type="module" crossorigin src="google-mwc.js"></script>
  <style>
    :root {
      --close-btn-bg: #ef4444;
      --close-btn-text: #ffffff;
    }
    .dark {
      --close-btn-bg: #dc2626;
    }
  </style>
  <script src="theme.js"></script>
</head>
<body class="m-0 font-sans bg-transparent overflow-y-auto">
  <div
    class="sticky top-0 bg-slate-200 dark:bg-slate-800 py-4 px-8 flex justify-between items-center border-b-2 border-slate-300 dark:border-slate-700 z-10">
    <h2 class="m-0 text-slate-700 dark:text-slate-200 text-xl">🛠️ 編集モード (ドラッグ＆ドロップで並び替え)</h2>
    <md-filled-button id="close-edit-btn"
      class=""
      style="--md-filled-button-container-color: var(--close-btn-bg); --md-filled-button-label-text-color: var(--close-btn-text);">
      完了して戻る
    </md-filled-button>
  </div>

  <div id="main-content" class="p-8 max-w-7xl mx-auto">
    <div id="icon-container" class="grid grid-cols-[repeat(auto-fill,minmax(120px,1fr))] gap-4"></div>
  </div>

  <script src="edit.js"></script>
</body>
</html>

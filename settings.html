<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設定</title>
  <link rel="stylesheet" href="output.css">
  <script src="theme.js"></script>
</head>

<body class="m-0 p-6 font-sans bg-white dark:bg-slate-800 h-screen box-border flex flex-col gap-4 overflow-y-auto">
  <div class="flex justify-between items-center mb-2">
    <h2 class="m-0 text-xl text-slate-700 dark:text-slate-200">⚙️ 設定・管理</h2>
    <button id="close-drawer-btn"
      class="bg-transparent border-none text-2xl cursor-pointer text-slate-600 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200">✕</button>
  </div>

  <input type="text" id="search-input" placeholder="🔍 登録済みサイトを検索..."
    class="w-full p-2.5 border border-slate-300 dark:border-slate-600 rounded-lg mb-2 box-border bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-200 placeholder-slate-400">

  <div class="border-t border-slate-200 dark:border-slate-700 pt-4">
    <h3 class="m-0 mb-2 text-slate-800 dark:text-slate-200">🌓 テーマ設定</h3>
    <select id="theme-select"
      class="w-full p-2.5 border border-slate-300 dark:border-slate-600 rounded-lg mb-4 box-border bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-200 outline-none">
      <option value="auto">システム (自動)</option>
      <option value="light">ライトモード</option>
      <option value="dark">ダークモード</option>
    </select>
  </div>

  <!-- ===== 壁紙設定セクション ===== -->
  <div class="border-t border-slate-200 dark:border-slate-700 pt-4">
    <h3 class="m-0 mb-3 text-slate-800 dark:text-slate-200">🖼️ 壁紙設定</h3>

    <!-- 壁紙タイプ選択 -->
    <div class="text-sm text-slate-600 dark:text-slate-400 mb-1 font-bold">壁紙タイプ</div>
    <select id="wallpaper-type"
      class="w-full p-2.5 border border-slate-300 dark:border-slate-600 rounded-lg mb-3 box-border bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-200 outline-none">
      <option value="none">なし（デフォルト背景）</option>
      <option value="color">単色</option>
      <option value="url">画像URL</option>
      <option value="file">画像ファイル</option>
    </select>

    <!-- 単色設定 -->
    <div id="wp-color-section" class="hidden mb-3">
      <div class="text-sm text-slate-600 dark:text-slate-400 mb-1 font-bold">背景色を選択</div>
      <div class="flex items-center gap-3">
        <input type="color" id="wp-color-picker" value="#1e293b"
          class="w-12 h-10 border border-slate-300 dark:border-slate-600 rounded cursor-pointer p-0.5 bg-transparent">
        <input type="text" id="wp-color-hex" value="#1e293b" maxlength="7"
          class="flex-1 p-2.5 border border-slate-300 dark:border-slate-600 rounded-lg box-border bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-200 font-mono text-sm">
      </div>
    </div>

    <!-- 画像URL設定 -->
    <div id="wp-url-section" class="hidden mb-3">
      <div class="text-sm text-slate-600 dark:text-slate-400 mb-1 font-bold">画像のURL</div>
      <input type="url" id="wp-url-input" placeholder="https://example.com/wallpaper.jpg"
        class="w-full p-2.5 border border-slate-300 dark:border-slate-600 rounded-lg mb-2 box-border bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-200">
      <div class="text-xs text-slate-400 dark:text-slate-500">※ Unsplash等の直リンク画像URLを入力してください</div>
    </div>

    <!-- 画像ファイル設定 -->
    <div id="wp-file-section" class="hidden mb-3">
      <div class="text-sm text-slate-600 dark:text-slate-400 mb-1 font-bold">画像ファイルを選択</div>
      <input type="file" id="wp-file-input" accept="image/*"
        class="w-full p-2.5 border border-slate-300 dark:border-slate-600 rounded-lg mb-2 box-border bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-200 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 dark:file:bg-slate-600 dark:file:text-slate-200">
      <div class="text-xs text-slate-400 dark:text-slate-500">※ 画像は自動的に最適化されます</div>
    </div>

    <!-- 壁紙プレビュー -->
    <div id="wp-preview-wrapper" class="hidden mb-3">
      <div class="text-sm text-slate-600 dark:text-slate-400 mb-1 font-bold">プレビュー</div>
      <div id="wp-preview-box"
        class="w-full h-28 rounded-lg border border-slate-300 dark:border-slate-600 overflow-hidden bg-slate-100 dark:bg-slate-900 relative">
        <div id="wp-preview-inner" class="w-full h-full bg-cover bg-center"></div>
      </div>
    </div>

    <!-- 表示方法 -->
    <div id="wp-fit-section" class="hidden mb-3">
      <div class="text-sm text-slate-600 dark:text-slate-400 mb-1 font-bold">表示方法</div>
      <select id="wp-fit-select"
        class="w-full p-2.5 border border-slate-300 dark:border-slate-600 rounded-lg mb-2 box-border bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-200 outline-none">
        <option value="cover">カバー（全体に表示）</option>
        <option value="contain">収める（比率維持）</option>
        <option value="center">中央に配置</option>
        <option value="repeat">繰り返し</option>
      </select>
    </div>

    <!-- ぼかし -->
    <div id="wp-blur-section" class="hidden mb-3">
      <div class="flex justify-between items-center mb-1">
        <div class="text-sm text-slate-600 dark:text-slate-400 font-bold">ぼかし</div>
        <span id="wp-blur-value" class="text-xs text-slate-500 dark:text-slate-400 font-mono">0px</span>
      </div>
      <input type="range" id="wp-blur-slider" min="0" max="20" value="0" step="1"
        class="w-full h-2 bg-slate-200 dark:bg-slate-600 rounded-lg appearance-none cursor-pointer accent-blue-500">
    </div>

    <!-- 不透明度 -->
    <div id="wp-opacity-section" class="hidden mb-3">
      <div class="flex justify-between items-center mb-1">
        <div class="text-sm text-slate-600 dark:text-slate-400 font-bold">不透明度</div>
        <span id="wp-opacity-value" class="text-xs text-slate-500 dark:text-slate-400 font-mono">100%</span>
      </div>
      <input type="range" id="wp-opacity-slider" min="0" max="100" value="100" step="5"
        class="w-full h-2 bg-slate-200 dark:bg-slate-600 rounded-lg appearance-none cursor-pointer accent-blue-500">
    </div>

    <!-- オーバーレイ色 -->
    <div id="wp-overlay-section" class="hidden mb-3">
      <div class="flex items-center gap-2 mb-1">
        <input type="checkbox" id="wp-overlay-toggle" class="accent-blue-500">
        <div class="text-sm text-slate-600 dark:text-slate-400 font-bold">オーバーレイ（色被せ）</div>
      </div>
      <div id="wp-overlay-controls" class="hidden flex items-center gap-3">
        <input type="color" id="wp-overlay-color" value="#000000"
          class="w-10 h-8 border border-slate-300 dark:border-slate-600 rounded cursor-pointer p-0.5 bg-transparent">
        <div class="flex-1">
          <div class="flex justify-between items-center mb-0.5">
            <span class="text-xs text-slate-400 dark:text-slate-500">濃さ</span>
            <span id="wp-overlay-opacity-value" class="text-xs text-slate-500 dark:text-slate-400 font-mono">30%</span>
          </div>
          <input type="range" id="wp-overlay-opacity" min="0" max="80" value="30" step="5"
            class="w-full h-2 bg-slate-200 dark:bg-slate-600 rounded-lg appearance-none cursor-pointer accent-blue-500">
        </div>
      </div>
    </div>

    <!-- 壁紙リセットボタン -->
    <button id="wp-reset-btn"
      class="hidden w-full mt-1 px-4 py-2 border border-red-300 dark:border-red-800 rounded-lg cursor-pointer bg-transparent hover:bg-red-50 dark:hover:bg-red-900/30 text-red-500 dark:text-red-400 font-medium transition-colors text-sm">🗑️ 壁紙をリセット</button>
  </div>
  <!-- ===== 壁紙設定セクション終了 ===== -->

  <div class="border-t border-slate-200 dark:border-slate-700 pt-4">
    <h3 class="m-0 mb-2 text-slate-800 dark:text-slate-200">新しいサイトを追加</h3>

    <div class="text-sm text-slate-600 dark:text-slate-400 mb-1 mt-2 font-bold">サイト情報</div>
    <input type="text" id="name-input" placeholder="サイト名"
      class="w-full p-2.5 border border-slate-300 dark:border-slate-600 rounded-lg mb-2 box-border bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-200">
    <input type="url" id="url-input" placeholder="https://example.com"
      class="w-full p-2.5 border border-slate-300 dark:border-slate-600 rounded-lg mb-2 box-border bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-200">

    <div class="text-sm text-slate-600 dark:text-slate-400 mb-1 mt-2 font-bold">アイコン設定（任意）</div>
    <div class="text-xs text-slate-400 dark:text-slate-500 mb-2">※ファイル、URL、ブランド検索のいずれかを選んでね。</div>

    <label class="text-sm text-slate-700 dark:text-slate-300 block mb-1 mt-2">🎨 Simple Icons から検索 (おすすめ):</label>
    <div class="relative">
      <input type="text" id="simple-icons-search" placeholder="例: github, youtube" autocomplete="off"
        class="w-full p-2.5 border border-slate-300 dark:border-slate-600 rounded-lg mb-2 box-border bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-200">
      <div id="si-suggestions"
        class="absolute top-full left-0 right-0 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-md max-h-40 overflow-y-auto z-10 hidden shadow-md">
      </div>
    </div>

    <div id="si-selected-preview"
      class="hidden items-center gap-2 mb-2 bg-slate-50 dark:bg-slate-700/50 p-2 rounded-lg border border-slate-200 dark:border-slate-600">
      <img id="si-preview-img" class="w-6 h-6 object-contain">
      <span id="si-selected-name" class="text-sm font-bold text-slate-700 dark:text-slate-200"></span>
      <button id="si-clear-btn" class="bg-transparent border-none text-red-500 cursor-pointer p-0 ml-auto text-xl"
        title="選択解除">✕</button>
    </div>

    <label class="text-sm text-slate-700 dark:text-slate-300 block mb-1 mt-2">📂 画像ファイルから:</label>
    <input type="file" id="icon-file-input" accept="image/*"
      class="w-full p-2.5 border border-slate-300 dark:border-slate-600 rounded-lg mb-2 box-border bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-200 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 dark:file:bg-slate-600 dark:file:text-slate-200">

    <label class="text-sm text-slate-700 dark:text-slate-300 block mb-1 mt-2">🔗 画像のURL:</label>
    <input type="url" id="icon-url-input" placeholder="http..."
      class="w-full p-2.5 border border-slate-300 dark:border-slate-600 rounded-lg mb-2 box-border bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-200">

    <button id="add-btn"
      class="w-full mt-4 px-4 py-2.5 border-none rounded-lg cursor-pointer bg-blue-500 hover:bg-blue-600 dark:bg-blue-600 dark:hover:bg-blue-500 text-white font-medium transition-colors">追加
      ＋</button>
  </div>

  <div class="flex gap-2 flex-wrap mt-auto border-t border-slate-200 dark:border-slate-700 pt-4">
    <button id="export-btn"
      class="px-4 py-2.5 border-none rounded-lg cursor-pointer bg-slate-200 hover:bg-slate-300 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 font-medium transition-colors">💾
      バックアップ</button>
    <label
      class="px-4 py-2.5 border-none rounded-lg cursor-pointer bg-slate-200 hover:bg-slate-300 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 font-medium inline-block transition-colors">
      📂 復元
      <input type="file" id="import-input" accept=".json" class="hidden">
    </label>
  </div>

  <script src="settings.js"></script>
</body>

</html>

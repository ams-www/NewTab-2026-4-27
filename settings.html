<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設定</title>
  <link rel="stylesheet" href="output.css">
  <style>
    body {
      margin: 0;
      padding: 1.5rem;
      font-family: system-ui, sans-serif;
      background: #fff;
      height: 100vh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      overflow-y: auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #64748b;
    }

    input[type="text"],
    input[type="url"],
    input[type="file"] {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      margin-bottom: 0.5rem;
      box-sizing: border-box;
    }

    button {
      padding: 0.6rem 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #3b82f6;
      color: white;
      font-weight: 500;
    }

    button.secondary {
      background: #e2e8f0;
      color: #334155;
    }

    .actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    .section-title {
      font-size: 0.9rem;
      color: #64748b;
      margin-bottom: 0.2rem;
      margin-top: 0.5rem;
    }
  </style>
</head>

<body>
  <div class="header">
    <h2 style="margin:0; font-size:1.25rem;">⚙️ 設定・管理</h2>
    <button id="close-drawer-btn" class="close-btn">✕</button>
  </div>

  <input type="text" id="search-input" placeholder="🔍 検索...">

  <div style="border-top: 1px solid #e2e8f0; padding-top: 1rem;">
    <h3 style="margin:0 0 0.5rem 0;">新しいサイトを追加</h3>

    <div class="section-title">サイト情報</div>
    <input type="text" id="name-input" placeholder="サイト名">
    <input type="url" id="url-input" placeholder="https://example.com">

    <div class="section-title">アイコン画像（任意）※オフライン対応</div>
    <div style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.5rem;">画像ファイルか画像URLのどちらかを選んでね。自動で小さく変換して保存するよ。</div>
    <input type="file" id="icon-file-input" accept="image/*">
    <input type="url" id="icon-url-input" placeholder="または 画像のURL (http...)">

    <button id="add-btn" style="width: 100%; margin-top: 0.5rem;">追加 ＋</button>
  </div>

  <div class="actions">
    <button id="export-btn" class="secondary">💾 書き出し</button>
    <label class="secondary"
      style="padding: 0.6rem 1rem; border-radius: 8px; cursor: pointer; background: #e2e8f0; color: #334155; display: inline-block; font-weight: 500;">
      📂 読み込み
      <input type="file" id="import-input" accept=".json" style="display: none;">
    </label>
  </div>

  <script src="settings.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設定</title>
  <link rel="stylesheet" href="output.css">
</head>
<body class="m-0 p-6 font-sans bg-white h-screen box-border flex flex-col gap-4 overflow-y-auto">
  <div class="flex justify-between items-center mb-2">
    <h2 class="m-0 text-xl text-slate-700">⚙️ 設定・管理</h2>
    <button id="close-drawer-btn" class="bg-transparent border-none text-2xl cursor-pointer text-slate-600">✕</button>
  </div>

  <input type="text" id="search-input" placeholder="🔍 登録済みサイトを検索..." class="w-full p-2.5 border border-slate-300 rounded-lg mb-2 box-border">

  <div class="border-t border-slate-200 pt-4">
    <h3 class="m-0 mb-2">新しいサイトを追加</h3>

    <div class="text-sm text-slate-600 mb-1 mt-2 font-bold">サイト情報</div>
    <input type="text" id="name-input" placeholder="サイト名" class="w-full p-2.5 border border-slate-300 rounded-lg mb-2 box-border">
    <input type="url" id="url-input" placeholder="https://example.com" class="w-full p-2.5 border border-slate-300 rounded-lg mb-2 box-border">

    <div class="text-sm text-slate-600 mb-1 mt-2 font-bold">アイコン設定（任意）</div>
    <div class="text-xs text-slate-400 mb-2">※ファイル、URL、ブランド検索のいずれかを選んでね。</div>
    
    <label class="text-sm text-slate-700 block mb-1 mt-2">🎨 Simple Icons から検索 (おすすめ):</label>
    <div class="relative">
      <input type="text" id="simple-icons-search" placeholder="例: github, youtube" autocomplete="off" class="w-full p-2.5 border border-slate-300 rounded-lg mb-2 box-border">
      <div id="si-suggestions" class="absolute top-full left-0 right-0 bg-white border border-slate-300 rounded-md max-h-40 overflow-y-auto z-10 hidden shadow-md"></div>
    </div>
    
    <div id="si-selected-preview" class="hidden items-center gap-2 mb-2 bg-slate-50 p-2 rounded-lg border border-slate-200">
      <img id="si-preview-img" class="w-6 h-6 object-contain">
      <span id="si-selected-name" class="text-sm font-bold text-slate-700"></span>
      <button id="si-clear-btn" class="bg-transparent border-none text-red-500 cursor-pointer p-0 ml-auto text-xl" title="選択解除">✕</button>
    </div>

    <label class="text-sm text-slate-700 block mb-1 mt-2">📂 画像ファイルから:</label>
    <input type="file" id="icon-file-input" accept="image/*" class="w-full p-2.5 border border-slate-300 rounded-lg mb-2 box-border">

    <label class="text-sm text-slate-700 block mb-1 mt-2">🔗 画像のURL:</label>
    <input type="url" id="icon-url-input" placeholder="http..." class="w-full p-2.5 border border-slate-300 rounded-lg mb-2 box-border">

    <button id="add-btn" class="w-full mt-4 px-4 py-2.5 border-none rounded-lg cursor-pointer bg-blue-500 text-white font-medium">追加 ＋</button>
  </div>

  <div class="flex gap-2 flex-wrap mt-auto border-t border-slate-200 pt-4">
    <button id="export-btn" class="px-4 py-2.5 border-none rounded-lg cursor-pointer bg-slate-200 text-slate-700 font-medium">💾 バックアップ</button>
    <label class="px-4 py-2.5 border-none rounded-lg cursor-pointer bg-slate-200 text-slate-700 font-medium inline-block">
      📂 復元
      <input type="file" id="import-input" accept=".json" class="hidden">
    </label>
  </div>

  <script src="settings.js"></script>
</body>
</html>
